<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Im-Possible</title>

<style>
  body {
    margin: 0;
    overflow: hidden;
    background: #0a0a0a;
  }

  canvas {
    display: block;
  }

  .hud {
    position: absolute;
    top: 10px;
    left: 10px;
    font-family: Arial;
    background: rgba(255,255,255,0.7);
    padding: 6px 10px;
    border-radius: 8px;
  }

  .win {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 48px;
    font-family: Arial;
    color: white;
    display: none;
  }
</style>
</head>

<body>

<div class="hud">Score: <span id="score">0</span></div>
<div id="win" class="win">YOU DID IT!</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const scoreText = document.getElementById("score");
const winText = document.getElementById("win");

// ---------------- PLAYER ----------------
const player = {
  x: 100,
  y: 0,
  w: 60,
  h: 60,
  vx: 0,
  vy: 0,
  grounded: false
};

const gravity = 0.6;
const jumpPower = -12;

// ---------------- ISLAND ----------------
const island = {
  x: canvas.width / 2 - 120,
  y: canvas.height - 140,
  w: 240,
  h: 25
};

// ---------------- LAVA ----------------
const lavaHeight = 70;

// ---------------- GAME STATE ----------------
let platforms = [];
let scrollY = 0;

let score = 0;
let highestRow = 0;
let gameWon = false;

// ---------------- CHUNK SYSTEM ----------------
let generatedRows = 0;
const maxRows = 1000;
const chunkSize = 60;

// ---------------- INPUT ----------------
const keys = {};

document.addEventListener("keydown", e => keys[e.key.toLowerCase()] = true);
document.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);

// ---------------- PLATFORM GENERATION (CHUNKED) ----------------
function generateChunk(startRow, count) {

  let y = island.y - startRow * 100;

  for (let i = 0; i < count; i++) {

    if (startRow + i >= maxRows) return;

    let width = 140;
    let safeX = canvas.width / 2 - 70;

    let platformCount = 1 + Math.floor(Math.random() * 2);

    for (let j = 0; j < platformCount; j++) {
      platforms.push({
        x: j === 0 ? safeX : Math.random() * (canvas.width - width),
        y: y,
        w: width,
        h: 20
      });
    }

    y -= 100;
  }

  generatedRows += count;
}

// ---------------- INIT ----------------
function init() {
  platforms = [];
  generatedRows = 0;

  generateChunk(0, chunkSize);
}

init();

// ---------------- RESET ----------------
function resetPlayer() {
  player.x = island.x + 80;
  player.y = island.y - player.h;
  player.vx = 0;
  player.vy = 0;

  highestRow = 0;
  score = 0;
}

// ---------------- DYNAMIC GENERATION ----------------
function maybeGenerateMore() {
  if (generatedRows >= maxRows) return;

  if (highestRow >= generatedRows - 10) {
    generateChunk(generatedRows, chunkSize);
  }
}

// ---------------- UPDATE ----------------
function update() {

  if (gameWon) return;

  // movement
  if (keys["a"] || keys["arrowleft"]) player.vx = -5;
  else if (keys["d"] || keys["arrowright"]) player.vx = 5;
  else player.vx *= 0.8;

  // jump
  if ((keys["w"] || keys["arrowup"] || keys[" "]) && player.grounded) {
    player.vy = jumpPower;
    player.grounded = false;
  }

  player.vy += gravity;

  player.x += player.vx;
  player.y += player.vy;

  player.grounded = false;

  // island collision
  if (
    player.x < island.x + island.w &&
    player.x + player.w > island.x &&
    player.y + player.h > island.y &&
    player.y + player.h < island.y + island.h + 10 &&
    player.vy >= 0
  ) {
    player.y = island.y - player.h;
    player.vy = 0;
    player.grounded = true;
  }

  // platform collision + SCORE (1 per row)
  for (let p of platforms) {
    if (
      player.x < p.x + p.w &&
      player.x + player.w > p.x &&
      player.y + player.h > p.y &&
      player.y + player.h < p.y + p.h + 10 &&
      player.vy >= 0
    ) {
      player.y = p.y - player.h;
      player.vy = 0;
      player.grounded = true;

      let row = Math.floor((island.y - p.y) / 100);

      if (row > highestRow) {
        highestRow = row;
        score = highestRow;
        scoreText.innerText = score;
      }
    }
  }

  scrollY = player.y - 200;

  // lava
  if (player.y + player.h > canvas.height - lavaHeight) {
    resetPlayer();
  }

  // bounds
  if (player.x < 0) player.x = 0;
  if (player.x + player.w > canvas.width)
    player.x = canvas.width - player.w;

  // dynamic generation
  maybeGenerateMore();

  // win
  if (score >= 100 && !gameWon) {
    gameWon = true;
    winText.style.display = "block";

    setTimeout(() => {
      window.location.href = "howdidyougethere.html";
    }, 2000);
  }
}

// ---------------- DRAW ----------------
function draw() {

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // background
  ctx.fillStyle = "#0a0a0a";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // platforms
  ctx.fillStyle = "#4ade80";
  for (let p of platforms) {
    ctx.fillRect(p.x, p.y - scrollY, p.w, p.h);
  }

  // island
  ctx.fillStyle = "#166534";
  ctx.fillRect(island.x, island.y - scrollY, island.w, island.h);

  // lava
  ctx.fillStyle = "red";
  ctx.fillRect(0, canvas.height - lavaHeight, canvas.width, lavaHeight);

  // player
  ctx.fillStyle = "#1e3a8a";
  ctx.fillRect(player.x, player.y - scrollY, player.w, player.h);
}

// ---------------- LOOP ----------------
function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

resetPlayer();
loop();

window.addEventListener("resize", () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  island.x = canvas.width / 2 - 120;
  island.y = canvas.height - 140;
});
</script>

</body>
</html>
