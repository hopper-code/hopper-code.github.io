<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Hopper - Blackhole</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: black;
}

canvas {
  display: block;
}
</style>
</head>

<body>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// ---------------- OBJECTS ----------------
const player = {
  x: canvas.width / 2,
  y: canvas.height / 2,
  size: 60,
  rot: 0,
  scale: 1
};

let particles = [];
let pullStrength = 0;

// ---------------- STARS ----------------
for (let i = 0; i < 200; i++) {
  particles.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    vx: 0,
    vy: 0,
    size: Math.random() * 2 + 1
  });
}

// ---------------- BLACK HOLE CENTER ----------------
const center = {
  x: canvas.width / 2,
  y: canvas.height / 2
};

// ---------------- UPDATE ----------------
function update() {
  pullStrength += 0.002;

  // pull everything toward center
  for (let p of particles) {
    let dx = center.x - p.x;
    let dy = center.y - p.y;

    p.vx += dx * pullStrength * 0.0001;
    p.vy += dy * pullStrength * 0.0001;

    p.x += p.vx;
    p.y += p.vy;
  }

  // player gets sucked in
  let dx = center.x - player.x;
  let dy = center.y - player.y;

  player.x += dx * 0.02;
  player.y += dy * 0.02;

  player.rot += 0.05;
  player.scale *= 0.995;
}

// ---------------- DRAW ----------------
function draw() {
  ctx.fillStyle = "black";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // black hole glow
  const gradient = ctx.createRadialGradient(
    center.x, center.y, 10,
    center.x, center.y, 200
  );
  gradient.addColorStop(0, "rgba(0,0,0,1)");
  gradient.addColorStop(0.3, "rgba(30,0,60,0.8)");
  gradient.addColorStop(1, "rgba(0,0,0,0)");

  ctx.fillStyle = gradient;
  ctx.beginPath();
  ctx.arc(center.x, center.y, 250, 0, Math.PI * 2);
  ctx.fill();

  // particles (stars)
  ctx.fillStyle = "white";
  for (let p of particles) {
    ctx.fillRect(p.x, p.y, p.size, p.size);
  }

  // player cube
  ctx.save();
  ctx.translate(player.x, player.y);
  ctx.rotate(player.rot);
  ctx.scale(player.scale, player.scale);

  ctx.fillStyle = "#3b82f6";
  ctx.fillRect(-player.size / 2, -player.size / 2, player.size, player.size);

  ctx.restore();
}

// ---------------- LOOP ----------------
function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

loop();

// ---------------- TRANSITION ----------------
setTimeout(() => {
  window.location.href = "antimatter.html";
}, 7000);

window.addEventListener("resize", () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});
</script>

</body>
</html>
