<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Loading...</title>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    flex-direction: column;
  }

  h1 {
    font-size: 40px;
    margin-bottom: 20px;
  }

  .dots::after {
    content: "";
    animation: dots 1.2s steps(3, end) infinite;
  }

  @keyframes dots {
    0%   { content: ""; }
    33%  { content: "."; }
    66%  { content: ".."; }
    100% { content: "..."; }
  }
</style>
</head>

<body>

<h1>Loading Hopper<span class="dots"></span></h1>

<script>
  setTimeout(() => {
    window.location.href = "game.html";
  }, 5000);
</script>

</body>
</html>
