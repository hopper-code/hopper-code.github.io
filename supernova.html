<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Hopper - Supernova</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: black;
}

canvas {
  display: block;
}
</style>
</head>

<body>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// ---------------- PLAYER FRAGMENTS ----------------
let pieces = [];

// original cube position
const center = {
  x: canvas.width / 2,
  y: canvas.height / 2
};

// explode cube into fragments
function explode() {
  for (let i = 0; i < 40; i++) {
    pieces.push({
      x: center.x,
      y: center.y,
      vx: (Math.random() - 0.5) * 12,
      vy: (Math.random() - 0.5) * 12,
      size: 10 + Math.random() * 10,
      rot: Math.random() * 360
    });
  }
}

explode();

// ---------------- FALLING CUBES ----------------
let debris = [];

function spawnDebris() {
  debris.push({
    x: Math.random() * canvas.width,
    y: -50,
    size: 10 + Math.random() * 30,
    speed: 2 + Math.random() * 6
  });
}

setInterval(spawnDebris, 80);

// ---------------- UPDATE ----------------
function update() {
  // fragments physics
  for (let p of pieces) {
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.2; // gravity
  }

  // falling cubes
  for (let d of debris) {
    d.y += d.speed;
  }

  debris = debris.filter(d => d.y < canvas.height + 100);
}

// ---------------- DRAW ----------------
function draw() {
  ctx.fillStyle = "black";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // glow stars
  for (let i = 0; i < 120; i++) {
    ctx.fillStyle = "rgba(255,255,255,0.2)";
    ctx.fillRect(Math.random() * canvas.width, Math.random() * canvas.height, 1, 1);
  }

  // debris cubes
  ctx.fillStyle = "#94a3b8";
  for (let d of debris) {
    ctx.fillRect(d.x, d.y, d.size, d.size);
  }

  // player fragments
  ctx.fillStyle = "#3b82f6";
  for (let p of pieces) {
    ctx.fillRect(p.x, p.y, p.size, p.size);
  }
}

// ---------------- LOOP ----------------
function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

loop();

// ---------------- NEXT LEVEL TRANSITION ----------------
setTimeout(() => {
  window.location.href = "blackhole.html";
}, 10000);

window.addEventListener("resize", () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});
</script>

</body>
</html>
